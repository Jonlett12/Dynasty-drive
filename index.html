<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Dynasty Drive</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-mark">DD</div>
          <div>
            <strong>Dynasty Drive</strong>
            <span>Fantasy sim</span>
          </div>
        </div>
        <nav class="nav" aria-label="Primary">
          <button class="nav-item active" data-view="hub">Dashboard</button>
          <button class="nav-item" data-view="matchup">Matchup</button>
          <button class="nav-item" data-view="roster">My Team</button>
          <button class="nav-item" data-view="market">Free Agents</button>
          <button class="nav-item" data-view="trade">Trades</button>
          <button class="nav-item" data-view="league">League</button>
        </nav>
        <div class="league-card">
          <span>League</span>
          <strong id="leagueName">Codex Champions</strong>
          <small id="leagueMeta">Year 2026 - Week 1</small>
        </div>
      </aside>

      <main class="main">
        <header class="topbar">
          <div>
            <p class="eyebrow" id="seasonStatus">Regular season</p>
            <h1 id="viewTitle">League Home</h1>
          </div>
          <div class="actions">
            <button class="ghost-btn" id="resetBtn">Reset</button>
            <button class="primary-btn" id="advanceBtn">Advance Week</button>
          </div>
        </header>

        <section class="stadium">
          <img class="stadium-art" src="assets/stadium-war-room.png" alt="Fantasy football draft room overlooking a stadium">
          <canvas id="stadiumCanvas" width="1200" height="420" aria-label="Night stadium draft room visual"></canvas>
          <div class="score-strip">
            <div>
              <span>Your Team</span>
              <strong id="heroRecord">0-0</strong>
            </div>
            <div>
              <span>Projected</span>
              <strong id="heroProjection">0.0</strong>
            </div>
            <div>
              <span>Cap Room</span>
              <strong id="heroCap">$100</strong>
            </div>
          </div>
        </section>

        <section class="view active" id="hubView"></section>
        <section class="view" id="matchupView"></section>
        <section class="view" id="rosterView"></section>
        <section class="view" id="marketView"></section>
        <section class="view" id="tradeView"></section>
        <section class="view" id="leagueView"></section>
        <section class="view" id="playerView"></section>
        <section class="view" id="teamView"></section>
      </main>
    </div>

    <div class="mobile-tabs" aria-label="Primary mobile navigation">
      <button class="nav-item active" data-view="hub">Home</button>
      <button class="nav-item" data-view="matchup">Matchup</button>
      <button class="nav-item" data-view="roster">Team</button>
      <button class="nav-item" data-view="market">Free</button>
      <button class="nav-item" data-view="trade">Trades</button>
      <button class="nav-item" data-view="league">League</button>
    </div>

    <script src="app.js"></script>
  </body>
</html>
